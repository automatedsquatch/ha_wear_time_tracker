# --- HISTORY STATS SENSORS ---------------------------------------------------
# These use the recorder to calculate how long the toggle has been on/off
# for each historical day. Requires sufficient recorder history (≥30 days
# for full monthly tracking).

sensor:
  # Off-time sensors (hours per day with device removed)
  - platform: history_stats
    name: liners_off_time_today
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) }}"
    end: "{{ now() }}"
  - platform: history_stats
    name: liners_off_time_yesterday
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=1) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) }}"
  - platform: history_stats
    name: liners_off_time_day_before_yesterday
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=2) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=1) }}"
  - platform: history_stats
    name: liners_off_time_3_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=3) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=2) }}"
  - platform: history_stats
    name: liners_off_time_4_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=4) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=3) }}"
  - platform: history_stats
    name: liners_off_time_5_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=5) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=4) }}"
  - platform: history_stats
    name: liners_off_time_6_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=6) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=5) }}"
  - platform: history_stats
    name: liners_off_time_7_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=7) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=6) }}"
  - platform: history_stats
    name: liners_off_time_14_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=14) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=13) }}"
  - platform: history_stats
    name: liners_off_time_21_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=21) }}"
    end: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=20) }}"
  - platform: history_stats
    name: liners_off_time_30_days_ago
    entity_id: input_boolean.liners_on
    state: "off"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) - timedelta(days=30) }}"
