# --- TEMPLATE SENSORS --------------------------------------------------------

template:
  - sensor:
      - name: "Liners Current Session Time"
        unique_id: liners_current_session_time
        state: >
          {% if is_state('input_boolean.liners_on', 'off') %}
            {% set removed_time = as_timestamp(states('input_datetime.liners_removed_time')) %}
            {% set now_time = as_timestamp(now()) %}
            {% if removed_time %}
              {{ ((now_time - removed_time) / 60) | round(0) }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "minutes"
        icon: "mdi:timer"

      - name: "Liners Daily Total Off Time"
        unique_id: liners_daily_total_off_time
        state: >
          {% set base_off_time = states('sensor.liners_off_time_today') | float(0) * 60 %}
          {% set adjustment = states('input_number.liners_daily_adjustment') | float(0) %}
          {{ (base_off_time - adjustment) | round(0) }}
        unit_of_measurement: "minutes"
        icon: "mdi:clock-time-eight"

      - name: "Liners Compliance Status"
        unique_id: liners_compliance_status
        state: >
          {% set daily_total = states('sensor.liners_daily_total_off_time') | int %}
          {% set current_session = states('sensor.liners_current_session_time') | int %}
          {% if current_session > 30 %}
            Session Limit Exceeded
          {% elif daily_total > 120 %}
            Daily Limit Exceeded
          {% elif is_state('input_boolean.liners_on', 'off') %}
            Currently Off
          {% else %}
            On Track
          {% endif %}
        icon: >
          {% set daily_total = states('sensor.liners_daily_total_off_time') | int %}
          {% set current_session = states('sensor.liners_current_session_time') | int %}
          {% if current_session > 30 or daily_total > 120 %}
            mdi:alert-circle
          {% elif is_state('input_boolean.liners_on', 'off') %}
            mdi:tooth-off
          {% else %}
            mdi:tooth
          {% endif %}

      - name: "Liners Daily Compliance Percentage"
        unique_id: liners_daily_compliance_percentage
        state: >
          {% set daily_total = states('sensor.liners_daily_total_off_time') | int %}
          {% set max_allowed = 120 %}
          {% if daily_total <= max_allowed %}
            {{ ((max_allowed - daily_total) / max_allowed * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "%"
        icon: "mdi:percent"

      - name: "Liners Weekly Compliance Score"
        unique_id: liners_weekly_compliance_score
        state: >
          {% set ns = namespace(compliant_days=0, total_days=0) %}
          {% set today_off_time = states('sensor.liners_daily_total_off_time') | float(0) / 60 %}
          {% if today_off_time != 0 or states('sensor.liners_off_time_today') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if today_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% set yesterday_raw_time = states('sensor.liners_off_time_yesterday') | float(0) %}
          {% set yesterday_adjustment = states('input_number.liners_permanent_adjustment_1_days_ago') | float(0) %}
          {% if yesterday_adjustment != 0 %}
            {% set yesterday_off_time = ((yesterday_raw_time * 60) - yesterday_adjustment) / 60 %}
          {% else %}
            {% set yesterday_off_time = yesterday_raw_time %}
          {% endif %}
          {% if yesterday_off_time != 0 or states('sensor.liners_off_time_yesterday') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if yesterday_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% set day2_raw_time = states('sensor.liners_off_time_day_before_yesterday') | float(0) %}
          {% set day2_adjustment = states('input_number.liners_permanent_adjustment_2_days_ago') | float(0) %}
          {% if day2_adjustment != 0 %}
            {% set day2_off_time = ((day2_raw_time * 60) - day2_adjustment) / 60 %}
          {% else %}
            {% set day2_off_time = day2_raw_time %}
          {% endif %}
          {% if day2_off_time != 0 or states('sensor.liners_off_time_day_before_yesterday') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if day2_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% set day3_raw_time = states('sensor.liners_off_time_3_days_ago') | float(0) %}
          {% set day3_adjustment = states('input_number.liners_permanent_adjustment_3_days_ago') | float(0) %}
          {% if day3_adjustment != 0 %}
            {% set day3_off_time = ((day3_raw_time * 60) - day3_adjustment) / 60 %}
          {% else %}
            {% set day3_off_time = day3_raw_time %}
          {% endif %}
          {% if day3_off_time != 0 or states('sensor.liners_off_time_3_days_ago') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if day3_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% set day4_raw_time = states('sensor.liners_off_time_4_days_ago') | float(0) %}
          {% set day4_adjustment = states('input_number.liners_permanent_adjustment_4_days_ago') | float(0) %}
          {% if day4_adjustment != 0 %}
            {% set day4_off_time = ((day4_raw_time * 60) - day4_adjustment) / 60 %}
          {% else %}
            {% set day4_off_time = day4_raw_time %}
          {% endif %}
          {% if day4_off_time != 0 or states('sensor.liners_off_time_4_days_ago') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if day4_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% set day5_raw_time = states('sensor.liners_off_time_5_days_ago') | float(0) %}
          {% set day5_adjustment = states('input_number.liners_permanent_adjustment_5_days_ago') | float(0) %}
          {% if day5_adjustment != 0 %}
            {% set day5_off_time = ((day5_raw_time * 60) - day5_adjustment) / 60 %}
          {% else %}
            {% set day5_off_time = day5_raw_time %}
          {% endif %}
          {% if day5_off_time != 0 or states('sensor.liners_off_time_5_days_ago') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if day5_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% set day6_raw_time = states('sensor.liners_off_time_6_days_ago') | float(0) %}
          {% set day6_adjustment = states('input_number.liners_permanent_adjustment_6_days_ago') | float(0) %}
          {% if day6_adjustment != 0 %}
            {% set day6_off_time = ((day6_raw_time * 60) - day6_adjustment) / 60 %}
          {% else %}
            {% set day6_off_time = day6_raw_time %}
          {% endif %}
          {% if day6_off_time != 0 or states('sensor.liners_off_time_6_days_ago') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if day6_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% if ns.total_days > 0 %}
            {{ (ns.compliant_days / ns.total_days * 100) | round(1) }}
          {% else %}
            100
          {% endif %}
        unit_of_measurement: "%"
        icon: "mdi:calendar-week"

      - name: "Liners Monthly Compliance Score"
        unique_id: liners_monthly_compliance_score
        state: >
          {% set ns = namespace(compliant_days=0, total_days=0) %}
          {% set today_off_time = states('sensor.liners_daily_total_off_time') | float(0) / 60 %}
          {% if today_off_time != 0 or states('sensor.liners_off_time_today') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if today_off_time <= 2.0 %}
              {% set ns.compliant_days = ns.compliant_days + 1 %}
            {% endif %}
          {% endif %}
          {% set yesterday_raw_time = states('sensor.liners_off_time_yesterday') | float(0) %}
          {% set yesterday_adjustment = states('input_number.liners_permanent_adjustment_1_days_ago') | float(0) %}
          {% if yesterday_adjustment != 0 %}
            {% set yesterday_off_time = ((yesterday_raw_time * 60) - yesterday_adjustment) / 60 %}
          {% else %}
            {% set yesterday_off_time = yesterday_raw_time %}
          {% endif %}
          {% if yesterday_off_time != 0 or states('sensor.liners_off_time_yesterday') not in ['unknown', 'unavailable'] %}
            {% set ns.total_days = ns.total_days + 1 %}
            {% if yesterday_off_time <= 2.0 %}
