# =============================================================================
# Wear Time Tracker - Home Assistant Package
# =============================================================================
# Tracks daily wear time for dental aligners/retainers/liners with:
#   - On/off toggle and session timing
#   - Configurable reminders at 40, 50, and 60 minutes
#   - Daily limit tracking (2 hours off-time per day)
#   - Weekly and monthly compliance scoring
#   - Streak tracking and historical averages
#   - Manual time correction (reduce/add minutes)
#   - Permanent adjustment storage for historical accuracy
#
# Install: copy this file into your Home Assistant packages/ directory.
# See README.md for setup instructions.
#
# https://www.home-assistant.io/docs/configuration/packages/
# =============================================================================

# --- INPUT BOOLEAN -----------------------------------------------------------

input_boolean:
  liners_on:
    name: "__DEVICE_NAME__ On"
    icon: mdi:tooth

# --- INPUT DATETIME ----------------------------------------------------------

input_datetime:
  liners_removed_time:
    name: "__DEVICE_NAME__ Removed Time"
    has_date: true
    has_time: true
    icon: mdi:clock-outline
  liners_daily_total_off:
    name: "__DEVICE_NAME__ Daily Total Off"
    has_date: false
    has_time: true
    icon: mdi:timer

# --- INPUT NUMBER ------------------------------------------------------------

input_number:
  liners_daily_adjustment:
    name: "__DEVICE_NAME__ Daily Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_reduce_time_input:
    name: Reduce Time Input
    min: 1
    max: 60
    initial: 30
    step: 1
    unit_of_measurement: minutes
    mode: slider
  liners_add_time_input:
    name: Add Time Input
    min: 1
    max: 60
    initial: 30
    step: 1
    unit_of_measurement: minutes
    mode: slider
  # Permanent adjustment storage - these hold the daily adjustment value
  # after midnight so historical compliance calculations stay accurate.
  # The daily migration automation shifts values through this chain.
  liners_permanent_adjustment_1_days_ago:
    name: "__DEVICE_NAME__ 1 Day Ago Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_permanent_adjustment_2_days_ago:
    name: "__DEVICE_NAME__ 2 Days Ago Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_permanent_adjustment_3_days_ago:
    name: "__DEVICE_NAME__ 3 Days Ago Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_permanent_adjustment_4_days_ago:
    name: "__DEVICE_NAME__ 4 Days Ago Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_permanent_adjustment_5_days_ago:
    name: "__DEVICE_NAME__ 5 Days Ago Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_permanent_adjustment_6_days_ago:
    name: "__DEVICE_NAME__ 6 Days Ago Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_permanent_adjustment_7_days_ago:
    name: "__DEVICE_NAME__ 7 Days Ago Adjustment"
    min: -480
    max: 480
    initial: 0
    step: 1
    unit_of_measurement: minutes
    mode: box
  liners_permanent_adjustment_14_days_ago:
